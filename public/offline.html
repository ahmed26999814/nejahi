<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MauriResults | غير متصل</title>
    <meta name="theme-color" content="#15803D" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8faf8;
        color: #0f172a;
        font-family: Tahoma, Arial, sans-serif;
      }
      main {
        width: min(92vw, 420px);
        padding: 24px;
        border: 1px solid #e5e7eb;
        border-radius: 24px;
        background: #fff;
        text-align: center;
        box-shadow: 0 18px 55px rgba(15, 23, 42, .08);
      }
      img {
        width: 72px;
        height: 72px;
        object-fit: contain;
        border-radius: 18px;
      }
      h1 {
        margin: 16px 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.8;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.png" alt="MauriResults" />
      <h1>أنت غير متصل بالإنترنت</h1>
      <p>تحقق من الاتصال ثم أعد فتح MauriResults للبحث عن النتائج.</p>
    </main>
  </body>
</html>
