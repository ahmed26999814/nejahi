name: Apply dark theme and subject CTA

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-dark-theme-subject-cta.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply UI and theme updates
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:120]!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          # Make dark mode the server/default appearance and restore a saved light choice before paint.
          replace_once(
              "app/layout.jsx",
              '<html lang="ar" dir="rtl" suppressHydrationWarning>',
              '<html lang="ar" dir="rtl" className="dark" data-theme="dark" suppressHydrationWarning>',
          )
          replace_once(
              "app/layout.jsx",
              '      <body className="font-arabic antialiased" suppressHydrationWarning>\n        <script type="application/ld+json"',
              '''      <body className="font-arabic antialiased" suppressHydrationWarning>
        <script
          dangerouslySetInnerHTML={{
            __html: `(function(){try{var key="mauriresults-theme";var saved=localStorage.getItem(key);var theme=saved==="light"||saved==="dark"?saved:"dark";if(!saved)localStorage.setItem(key,theme);var root=document.documentElement;root.dataset.theme=theme;root.classList.toggle("dark",theme==="dark");root.style.colorScheme=theme;}catch(error){var root=document.documentElement;root.dataset.theme="dark";root.classList.add("dark");root.style.colorScheme="dark";}})();`,
          }}
        />
        <script type="application/ld+json"''',
          )

          # The React state also starts dark so the theme icon never renders in the wrong state.
          replace_once(
              "components/home/HomeApplication.jsx",
              '  const [theme, setThemeState] = useState("light");',
              '  const [theme, setThemeState] = useState("dark");',
          )
          replace_once(
              "components/home/HomeApplication.jsx",
              '    setTheme(saved || "light");',
              '    setTheme(saved === "light" || saved === "dark" ? saved : "dark");',
          )

          page = Path("components/results/BepcSubjectsPageClient.jsx")
          text = page.read_text(encoding="utf-8")

          text = text.replace(
              '''function ArrowRightIcon() {
  return (
    <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
      <path d="M19 12H5" />
      <path d="m12 19-7-7 7-7" />
    </svg>
  );
}
''',
              '''function ArrowRightIcon() {
  return (
    <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
      <path d="M19 12H5" />
      <path d="m12 19-7-7 7-7" />
    </svg>
  );
}

function SunIcon() {
  return (
    <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
      <circle cx="12" cy="12" r="4" />
      <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41" />
    </svg>
  );
}

function MoonIcon() {
  return (
    <svg viewBox="0 0 24 24" className="h-5 w-5" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true">
      <path d="M20.5 14.3A8.4 8.4 0 0 1 9.7 3.5 8.5 8.5 0 1 0 20.5 14.3Z" />
    </svg>
  );
}

function applyTheme(nextTheme, persist = true) {
  const theme = nextTheme === "light" ? "light" : "dark";
  const root = document.documentElement;
  root.dataset.theme = theme;
  root.classList.toggle("dark", theme === "dark");
  root.style.colorScheme = theme;
  if (persist) localStorage.setItem("mauriresults-theme", theme);
  document.querySelectorAll('meta[name="theme-color"]').forEach((meta) => {
    meta.setAttribute("content", theme === "dark" ? "#07130d" : "#f3f7f4");
  });
  return theme;
}
''',
              1,
          )

          text = text.replace(
              '  const [error, setError] = useState("");\n  const requestRef = useRef(null);',
              '  const [error, setError] = useState("");\n  const [theme, setTheme] = useState("dark");\n  const requestRef = useRef(null);',
              1,
          )

          text = text.replace(
              '  const cleanNumber = useMemo(() => normalizeDigits(number), [number]);\n\n  const runSearch',
              '''  const cleanNumber = useMemo(() => normalizeDigits(number), [number]);

  useEffect(() => {
    const saved = localStorage.getItem("mauriresults-theme");
    const initialTheme = saved === "light" || saved === "dark" ? saved : "dark";
    setTheme(applyTheme(initialTheme, !saved));
  }, []);

  const runSearch''',
              1,
          )

          text = text.replace(
              '''  function goBack() {
    if (window.history.length > 1) window.history.back();
    else window.location.assign("/");
  }
''',
              '''  function toggleTheme() {
    const nextTheme = theme === "dark" ? "light" : "dark";
    setTheme(applyTheme(nextTheme));
  }

  function goBack() {
    if (window.history.length > 1) window.history.back();
    else window.location.assign("/");
  }
''',
              1,
          )

          old_actions = '''          {showingResult ? (
            <button type="button" onClick={resetSearch} className="grid h-10 w-10 shrink-0 place-items-center rounded-[15px] bg-emerald-100 text-emerald-700 transition active:scale-95 dark:bg-emerald-300/10 dark:text-emerald-300" aria-label="بحث جديد">
              <SearchIcon />
            </button>
          ) : (
            <div className="grid h-10 w-10 shrink-0 place-items-center rounded-[15px] bg-emerald-100 text-xl dark:bg-emerald-300/10" aria-hidden="true">📚</div>
          )}'''
          new_actions = '''          <div className="flex shrink-0 items-center gap-1.5">
            <button
              type="button"
              onClick={toggleTheme}
              className="grid h-10 w-10 place-items-center rounded-[15px] border border-slate-200 bg-white text-slate-700 shadow-sm transition active:scale-95 dark:border-white/10 dark:bg-white/[.07] dark:text-amber-300"
              aria-label={theme === "dark" ? "تفعيل الوضع الفاتح" : "تفعيل الوضع الداكن"}
              title={theme === "dark" ? "الوضع الفاتح" : "الوضع الداكن"}
            >
              {theme === "dark" ? <SunIcon /> : <MoonIcon />}
            </button>
            {showingResult ? (
              <button type="button" onClick={resetSearch} className="grid h-10 w-10 place-items-center rounded-[15px] bg-emerald-100 text-emerald-700 transition active:scale-95 dark:bg-emerald-300/10 dark:text-emerald-300" aria-label="بحث جديد">
                <SearchIcon />
              </button>
            ) : (
              <div className="grid h-10 w-10 place-items-center rounded-[15px] bg-emerald-100 text-xl dark:bg-emerald-300/10" aria-hidden="true">📚</div>
            )}
          </div>'''
          if old_actions not in text:
              raise SystemExit("Subject page header action block not found")
          text = text.replace(old_actions, new_actions, 1)
          page.write_text(text, encoding="utf-8")

          # Make the subject-details action the first and strongest action on a BEPC result card.
          sanitizer = Path("components/results/ResultDetailSanitizer.jsx")
          text = sanitizer.read_text(encoding="utf-8")
          text = text.replace(
              '    if (existing?.tagName === "BUTTON") return;\n    existing?.remove();',
              '    if (existing?.dataset.subjectDetailsVersion === "2") return;\n    existing?.remove();',
              1,
          )
          text = text.replace(
              '    button.dataset.subjectDetailsButton = "true";\n    button.className =\n      "action-button mt-3 flex min-h-12 w-full items-center justify-center gap-2 rounded-[16px] border border-mauri-green/25 bg-mauri-green/5 px-4 text-sm font-black text-mauri-green transition hover:border-mauri-green/40 hover:bg-mauri-green/10 active:scale-[.98] dark:border-emerald-300/20 dark:bg-emerald-300/10 dark:text-emerald-300";',
              '''    button.dataset.subjectDetailsButton = "true";
    button.dataset.subjectDetailsVersion = "2";
    button.className =
      "mt-3 flex min-h-[68px] w-full items-center gap-3 overflow-hidden rounded-[20px] border border-emerald-300/35 bg-gradient-to-l from-[#087047] via-emerald-600 to-emerald-500 px-3.5 py-3 text-right text-white shadow-[0_16px_38px_rgba(5,150,105,.30)] outline-none transition hover:-translate-y-0.5 hover:shadow-[0_20px_46px_rgba(5,150,105,.36)] focus:ring-4 focus:ring-emerald-500/25 active:scale-[.98]";''',
              1,
          )
          text = text.replace(
              '''    button.innerHTML =
      '<span aria-hidden="true">📚</span><span>تفاصيل المواد</span><span aria-hidden="true">←</span>';''',
              '''    button.innerHTML =
      '<span class="grid h-11 w-11 shrink-0 place-items-center rounded-2xl bg-white/15 text-xl ring-1 ring-white/20" aria-hidden="true">📚</span><span class="min-w-0 flex-1"><strong class="block text-sm font-black leading-5">تفاصيل المواد</strong><small class="mt-0.5 block text-[10px] font-bold text-emerald-50">عرض درجات جميع المواد</small></span><span class="grid h-9 w-9 shrink-0 place-items-center rounded-xl bg-white/12 text-lg font-black" aria-hidden="true">←</span>';''',
              1,
          )
          text = text.replace(
              '    primaryActions.insertAdjacentElement("afterend", button);',
              '    primaryActions.insertAdjacentElement("beforebegin", button);',
              1,
          )
          sanitizer.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow and commit
        shell: bash
        run: |
          rm -f .github/workflows/apply-dark-theme-subject-cta.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Make dark mode default and highlight subject details"
          git push
