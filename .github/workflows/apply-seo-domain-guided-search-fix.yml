name: Apply SEO Domain Guided Search Fix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-seo-domain-guided-search-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Apply requested fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          source_dirs = [root / name for name in ('app', 'components', 'hooks', 'lib', 'public')]
          extensions = {'.js', '.jsx', '.ts', '.tsx', '.json', '.xml', '.webmanifest', '.css', '.md'}

          # One preferred production hostname and one spelling for ابريفه.
          for base in source_dirs:
              if not base.exists():
                  continue
              for path in base.rglob('*'):
                  if not path.is_file() or path.suffix.lower() not in extensions:
                      continue
                  try:
                      text = path.read_text(encoding='utf-8')
                  except UnicodeDecodeError:
                      continue
                  updated = (
                      text
                      .replace('https://mauri-results.vercel.app', 'https://mauriresults.vercel.app')
                      .replace('البريفيه', 'ابريفه')
                      .replace('أبريفه', 'ابريفه')
                  )
                  if updated != text:
                      path.write_text(updated, encoding='utf-8')

          layout = Path('app/layout.jsx')
          text = layout.read_text(encoding='utf-8')
          text = text.replace(
              'نتائج ابريفه وكونكور 2026 نعمل على إضافتها، وستكون متاحة بعد لحظات',
              'تم فتح نتائج ابريفه وكونكور 2026 — ابحث الآن عن نتيجتك'
          )
          text = text.replace('import UploadedConcoursSelectEnhancer from "../components/ui/UploadedConcoursSelectEnhancer";\n', '')
          text = text.replace('        <UploadedConcoursSelectEnhancer />\n', '')
          layout.write_text(text, encoding='utf-8')

          home = Path('components/home/HomeApplication.jsx')
          text = home.read_text(encoding='utf-8')
          pattern = re.compile(
              r'function UploadedConcoursSearchPanel\(\{ exam, onSelect, text \}\) \{.*?\n\}\n\nfunction SelectField',
              re.S,
          )
          replacement = r'''async function fetchUploadedConcoursOptions(source, level, wilaya = "", moughataa = "", signal) {
  const params = new URLSearchParams({ source, level });
  if (wilaya) params.set("wilaya", wilaya);
  if (moughataa) params.set("moughataa", moughataa);
  const response = await fetch(`/api/uploaded-concours-locations?${params.toString()}`, {
    headers: { Accept: "application/json" },
    cache: "no-store",
    signal,
  });
  const data = await response.json();
  if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
  return uniqueSorted(Array.isArray(data.options) ? data.options : []);
}

function UploadedConcoursSearchPanel({ exam, onSelect, text }) {
  const [wilaya, setWilaya] = useState("");
  const [moughataa, setMoughataa] = useState("");
  const [centre, setCentre] = useState("");
  const [number, setNumber] = useState("");
  const [wilayas, setWilayas] = useState([]);
  const [moughataas, setMoughataas] = useState([]);
  const [centres, setCentres] = useState([]);
  const [loadingLevel, setLoadingLevel] = useState("wilaya");
  const [searching, setSearching] = useState(false);
  const [localError, setLocalError] = useState("");

  useEffect(() => {
    const controller = new AbortController();
    setWilaya("");
    setMoughataa("");
    setCentre("");
    setNumber("");
    setWilayas([]);
    setMoughataas([]);
    setCentres([]);
    setLocalError("");
    setLoadingLevel("wilaya");

    fetchUploadedConcoursOptions(exam.source, "wilaya", "", "", controller.signal)
      .then((options) => {
        setWilayas(options);
        if (!options.length) setLocalError(text.noData || "لا توجد خيارات متاحة.");
      })
      .catch((error) => {
        if (error?.name !== "AbortError") {
          console.error("[MauriResults Uploaded Concours Wilayas]", error);
          setLocalError(text.connectionError);
        }
      })
      .finally(() => {
        if (!controller.signal.aborted) setLoadingLevel("");
      });

    return () => controller.abort();
  }, [exam.source, text.connectionError, text.noData]);

  useEffect(() => {
    setMoughataa("");
    setCentre("");
    setNumber("");
    setMoughataas([]);
    setCentres([]);
    if (!wilaya) return undefined;

    const controller = new AbortController();
    setLocalError("");
    setLoadingLevel("moughataa");
    fetchUploadedConcoursOptions(exam.source, "moughataa", wilaya, "", controller.signal)
      .then((options) => {
        setMoughataas(options);
        if (!options.length) setLocalError(text.noData || "لا توجد مقاطعات متاحة.");
      })
      .catch((error) => {
        if (error?.name !== "AbortError") {
          console.error("[MauriResults Uploaded Concours Moughataas]", error);
          setLocalError(text.connectionError);
        }
      })
      .finally(() => {
        if (!controller.signal.aborted) setLoadingLevel("");
      });
    return () => controller.abort();
  }, [exam.source, wilaya, text.connectionError, text.noData]);

  useEffect(() => {
    setCentre("");
    setNumber("");
    setCentres([]);
    if (!wilaya || !moughataa) return undefined;

    const controller = new AbortController();
    setLocalError("");
    setLoadingLevel("centre");
    fetchUploadedConcoursOptions(exam.source, "centre", wilaya, moughataa, controller.signal)
      .then((options) => {
        setCentres(options);
        if (!options.length) setLocalError(text.noData || "لا توجد مراكز متاحة.");
      })
      .catch((error) => {
        if (error?.name !== "AbortError") {
          console.error("[MauriResults Uploaded Concours Centres]", error);
          setLocalError(text.connectionError);
        }
      })
      .finally(() => {
        if (!controller.signal.aborted) setLoadingLevel("");
      });
    return () => controller.abort();
  }, [exam.source, wilaya, moughataa, text.connectionError, text.noData]);

  async function submit(event) {
    event.preventDefault();
    setLocalError("");
    if (![wilaya, moughataa, centre, number].every((value) => cleanText(value))) {
      setLocalError(text.enterQuery);
      return;
    }

    setSearching(true);
    try {
      const params = new URLSearchParams({
        source: exam.source,
        wilaya: wilaya.trim(),
        moughataa: moughataa.trim(),
        centre: centre.trim(),
        number: number.trim(),
      });
      const response = await fetch(`/api/uploaded-concours-search?${params.toString()}`, {
        headers: { Accept: "application/json" },
        cache: "no-store",
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
      const students = prepareRowsForExam(exam, data.rows || []);
      if (!students.length) {
        setLocalError(text.notFound);
        return;
      }
      onSelect(students[0]);
    } catch (error) {
      console.error("[MauriResults Uploaded Concours Search Error]", error);
      setLocalError(text.connectionError);
    } finally {
      setSearching(false);
    }
  }

  return (
    <form className="search-card animate-slide-up" onSubmit={submit} aria-busy={searching || Boolean(loadingLevel)}>
      <div className="col-span-full flex items-center justify-between gap-2 px-1">
        <strong className="text-xs font-black text-mauri-green dark:text-mauri-gold">البحث بالخيارات</strong>
        <span className="text-[11px] font-bold text-slate-500 dark:text-slate-400">الولاية ← المقاطعة ← المركز ← الرقم</span>
      </div>
      <SelectField
        disabled={searching || loadingLevel === "wilaya"}
        label={loadingLevel === "wilaya" ? "جاري تحميل الولايات..." : (text.chooseWilaya || "اختر الولاية")}
        onChange={setWilaya}
        options={wilayas}
        value={wilaya}
      />
      <SelectField
        disabled={searching || !wilaya || loadingLevel === "moughataa"}
        label={loadingLevel === "moughataa" ? "جاري تحميل المقاطعات..." : (text.chooseMoughataa || "اختر المقاطعة")}
        onChange={setMoughataa}
        options={moughataas}
        value={moughataa}
      />
      <SelectField
        disabled={searching || !moughataa || loadingLevel === "centre"}
        label={loadingLevel === "centre" ? "جاري تحميل المراكز..." : (text.chooseCentre || "اختر مركز الامتحان")}
        onChange={setCentre}
        options={centres}
        value={centre}
      />
      <label className="grid gap-1">
        <span className="px-1 text-[11px] font-black text-slate-500 dark:text-slate-400">{text.candidateNumber || text.number || "رقم المترشح"}</span>
        <input
          className="search-input pr-4"
          disabled={searching || !centre}
          inputMode="numeric"
          enterKeyHint="search"
          pattern="[0-9]*"
          onChange={(event) => setNumber(event.target.value)}
          placeholder={text.candidateNumber || text.number || "رقم المترشح"}
          value={number}
        />
      </label>
      <button className="tap-button h-12 rounded-[16px] bg-gradient-to-l from-mauri-green via-emerald-600 to-emerald-500 px-5 text-sm font-black text-white shadow-[0_16px_35px_rgba(21,128,61,.22)] transition hover:-translate-y-0.5 hover:shadow-[0_20px_45px_rgba(21,128,61,.28)] active:scale-[.98] disabled:cursor-wait disabled:opacity-70" disabled={searching || Boolean(loadingLevel)} type="submit">
        {searching ? text.searching : text.searchButton}
      </button>
      {localError && <SearchErrorHelp error={localError} text={text} />}
    </form>
  );
}

function SelectField'''
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Could not replace UploadedConcoursSearchPanel; matches={count}')
          home.write_text(text, encoding='utf-8')

          Path('middleware.ts').write_text('''import { NextResponse } from "next/server";\nimport type { NextRequest } from "next/server";\n\nconst CANONICAL_HOST = "mauriresults.vercel.app";\nconst LEGACY_HOST = "mauri-results.vercel.app";\n\nexport function middleware(request: NextRequest) {\n  const forwardedHost = request.headers.get("x-forwarded-host");\n  const host = String(forwardedHost || request.headers.get("host") || "")\n    .split(":")[0]\n    .trim()\n    .toLowerCase();\n\n  if (host === LEGACY_HOST) {\n    const canonicalUrl = request.nextUrl.clone();\n    canonicalUrl.protocol = "https:";\n    canonicalUrl.hostname = CANONICAL_HOST;\n    canonicalUrl.port = "";\n    return NextResponse.redirect(canonicalUrl, 308);\n  }\n\n  if (request.nextUrl.pathname === "/api/public-exams") {\n    const url = request.nextUrl.clone();\n    if (url.searchParams.has("client")) return NextResponse.next();\n\n    const isBrowserRequest = Boolean(\n      request.headers.get("sec-fetch-site") ||\n      request.headers.get("sec-fetch-mode") ||\n      request.headers.get("referer")\n    );\n\n    if (!isBrowserRequest) {\n      url.searchParams.set("client", "mobile");\n      return NextResponse.rewrite(url);\n    }\n  }\n\n  return NextResponse.next();\n}\n\nexport const config = {\n  matcher: ["/((?!_next/static|_next/image|favicon.ico).*)"],\n};\n''', encoding='utf-8')

          enhancer = Path('components/ui/UploadedConcoursSelectEnhancer.jsx')
          if enhancer.exists():
              enhancer.unlink()
          PY

          rm -f .github/workflows/apply-seo-domain-guided-search-fix.yml

      - name: Install dependencies
        run: npm ci

      - name: Validate production build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: npm run build

      - name: Commit fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix guided options, ابريفه naming, and canonical domain"
          git push
