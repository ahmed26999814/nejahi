name: Safe production load test

on:
  push:
    branches:
      - perf/safe-load-test-20260721
  workflow_dispatch:

permissions:
  contents: write

jobs:
  load-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: perf/safe-load-test-20260721
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test client
        run: python -m pip install --disable-pip-version-check aiohttp==3.10.11

      - name: Run staged safe load test
        shell: bash
        env:
          TARGET: https://mauri-results.vercel.app
        run: |
          cat > /tmp/load_test.py <<'PY'
          import asyncio
          import json
          import math
          import os
          import random
          import statistics
          import time
          from collections import Counter
          from urllib.parse import urljoin

          import aiohttp

          TARGET = os.environ["TARGET"].rstrip("/") + "/"
          TIMEOUT = aiohttp.ClientTimeout(total=20, connect=7, sock_read=12)
          HEADERS = {
              "User-Agent": "MauriResults-Authorized-Safe-Load-Test/2026-07-21",
              "Accept": "application/json,text/html;q=0.9,*/*;q=0.8",
              "Accept-Encoding": "gzip",
              "Cache-Control": "no-cache",
          }

          def percentile(values, pct):
              if not values:
                  return 0.0
              ordered = sorted(values)
              index = max(0, min(len(ordered) - 1, math.ceil((pct / 100) * len(ordered)) - 1))
              return ordered[index]

          async def one(session, semaphore, path):
              url = urljoin(TARGET, path.lstrip("/"))
              async with semaphore:
                  started = time.perf_counter()
                  try:
                      async with session.get(url, allow_redirects=True) as response:
                          body = await response.read()
                          return {
                              "status": response.status,
                              "seconds": time.perf_counter() - started,
                              "bytes": len(body),
                              "cache": response.headers.get("x-vercel-cache", "NONE"),
                              "final_path": response.url.path,
                              "error": "",
                          }
                  except Exception as exc:
                      return {
                          "status": 0,
                          "seconds": time.perf_counter() - started,
                          "bytes": 0,
                          "cache": "NONE",
                          "final_path": "",
                          "error": f"{type(exc).__name__}:{exc}",
                      }

          async def stage(session, group, paths, total, concurrency):
              sem = asyncio.Semaphore(concurrency)
              selected = [paths[i % len(paths)] for i in range(total)]
              random.Random(total * 1000 + concurrency).shuffle(selected)
              started = time.perf_counter()
              rows = await asyncio.gather(*(one(session, sem, path) for path in selected))
              wall = time.perf_counter() - started
              lat = [row["seconds"] * 1000 for row in rows]
              statuses = Counter(row["status"] for row in rows)
              caches = Counter(row["cache"] for row in rows)
              errors = Counter(row["error"] for row in rows if row["error"])
              success = sum(v for k, v in statuses.items() if 200 <= k < 400)
              result = {
                  "group": group,
                  "requests": total,
                  "concurrency": concurrency,
                  "wall_seconds": round(wall, 3),
                  "rps": round(total / wall, 2),
                  "success_percent": round(success * 100 / total, 3),
                  "mean_ms": round(statistics.fmean(lat), 1),
                  "p50_ms": round(percentile(lat, 50), 1),
                  "p95_ms": round(percentile(lat, 95), 1),
                  "p99_ms": round(percentile(lat, 99), 1),
                  "max_ms": round(max(lat), 1),
                  "statuses": dict(statuses),
                  "cache": dict(caches),
                  "errors": dict(errors),
                  "download_mb": round(sum(row["bytes"] for row in rows) / 1048576, 2),
              }
              print("RESULT " + json.dumps(result, ensure_ascii=False), flush=True)
              return result

          async def main():
              connector = aiohttp.TCPConnector(limit=600, limit_per_host=600, ttl_dns_cache=300)
              results = []
              async with aiohttp.ClientSession(timeout=TIMEOUT, headers=HEADERS, connector=connector) as session:
                  warm = [
                      "/",
                      "/api/public-exams",
                      "/api/public-data?resource=site_content",
                      "/api/result-shard/bac/541",
                      "/api/result-shard/upload--brevet_2026/541",
                      "/api/search?source=bac&q=00541",
                  ]
                  for path in warm:
                      await one(session, asyncio.Semaphore(1), path)

                  plans = [
                      ("home-cdn", ["/"], [(500, 50), (1000, 150), (1500, 300)]),
                      ("public-exams", ["/api/public-exams"], [(400, 40), (700, 100), (1000, 200)]),
                      ("site-content", ["/api/public-data?resource=site_content"], [(300, 30), (500, 75), (700, 150)]),
                      ("bac-shard-warm", ["/api/result-shard/bac/541"], [(500, 50), (900, 125), (1300, 250)]),
                      ("brevet-2026-shard-warm", ["/api/result-shard/upload--brevet_2026/541"], [(400, 40), (700, 100), (1000, 200)]),
                      ("fallback-search", ["/api/search?source=bac&q=00541"], [(120, 10), (240, 25), (360, 50)]),
                  ]

                  mixed = [f"/api/result-shard/bac/{n:03d}" for n in (17, 41, 63, 88, 104, 127, 159, 203, 246, 288, 327, 369, 411, 458, 503, 541, 627, 714, 833, 947)]
                  plans.append(("bac-20-shard-mix", mixed, [(300, 25), (500, 60), (800, 120)]))

                  for group, paths, levels in plans:
                      for total, concurrency in levels:
                          result = await stage(session, group, paths, total, concurrency)
                          results.append(result)
                          if result["success_percent"] < 99.0 or result["p95_ms"] > 6000:
                              print(f"SAFETY_STOP {group}", flush=True)
                              break
                          await asyncio.sleep(2)

              with open("load-test-report.json", "w", encoding="utf-8") as f:
                  json.dump(results, f, ensure_ascii=False, indent=2)

              with open("load-test-report.md", "w", encoding="utf-8") as f:
                  f.write("# MauriResults safe production load test\n\n")
                  f.write("Test date: 2026-07-21 UTC\n\n")
                  f.write("| Endpoint group | Requests | Concurrency | RPS | Success | p50 ms | p95 ms | p99 ms | Max ms | Cache |\n")
                  f.write("|---|---:|---:|---:|---:|---:|---:|---:|---:|---|\n")
                  for r in results:
                      f.write(f"| {r['group']} | {r['requests']} | {r['concurrency']} | {r['rps']} | {r['success_percent']}% | {r['p50_ms']} | {r['p95_ms']} | {r['p99_ms']} | {r['max_ms']} | `{r['cache']}` |\n")

          asyncio.run(main())
          PY
          python /tmp/load_test.py | tee load-test-run.log

      - name: Save report to test branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add load-test-report.json load-test-report.md
          git commit -m "إضافة تقرير اختبار الضغط الآمن [skip ci]"
          git push origin HEAD:perf/safe-load-test-20260721
