name: Final measured production load test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  measured-load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check aiohttp==3.10.11
      - name: Measure representative maximum stages
        env:
          TARGET: https://mauri-results.vercel.app
        shell: bash
        run: |
          cat > /tmp/test.py <<'PY'
          import asyncio, json, math, os, statistics, time
          from collections import Counter
          from urllib.parse import urljoin
          import aiohttp

          BASE=os.environ['TARGET'].rstrip('/')+'/'
          HEADERS={'User-Agent':'MauriResults-Authorized-Final-Load-Test/2026-07-21','Accept-Encoding':'gzip','Accept':'*/*'}
          TIMEOUT=aiohttp.ClientTimeout(total=20,connect=7,sock_read=12)

          def pct(values,p):
              values=sorted(values)
              return values[max(0,min(len(values)-1,math.ceil(len(values)*p/100)-1))]

          async def request(session,semaphore,path):
              async with semaphore:
                  started=time.perf_counter()
                  try:
                      async with session.get(urljoin(BASE,path.lstrip('/')),allow_redirects=True) as response:
                          body=await response.read()
                          return response.status,(time.perf_counter()-started)*1000,len(body),response.headers.get('x-vercel-cache','NONE'),''
                  except Exception as error:
                      return 0,(time.perf_counter()-started)*1000,0,'NONE',type(error).__name__

          async def run(session,name,paths,total,concurrency):
              semaphore=asyncio.Semaphore(concurrency)
              started=time.perf_counter()
              rows=await asyncio.gather(*[request(session,semaphore,paths[i%len(paths)]) for i in range(total)])
              wall=time.perf_counter()-started
              latencies=[row[1] for row in rows]
              statuses=Counter(row[0] for row in rows)
              caches=Counter(row[3] for row in rows)
              errors=Counter(row[4] for row in rows if row[4])
              good=sum(value for status,value in statuses.items() if 200<=status<400)
              result={
                  'name':name,'requests':total,'concurrency':concurrency,
                  'rps':round(total/wall,2),'success':round(good*100/total,3),
                  'mean_ms':round(statistics.fmean(latencies),1),
                  'p50_ms':round(pct(latencies,50),1),'p95_ms':round(pct(latencies,95),1),
                  'p99_ms':round(pct(latencies,99),1),'max_ms':round(max(latencies),1),
                  'statuses':dict(statuses),'cache':dict(caches),'errors':dict(errors),
                  'download_mb':round(sum(row[2] for row in rows)/1048576,2)
              }
              print('LOAD_RESULT '+json.dumps(result,ensure_ascii=False),flush=True)

          async def main():
              connector=aiohttp.TCPConnector(limit=500,limit_per_host=500,ttl_dns_cache=300)
              async with aiohttp.ClientSession(headers=HEADERS,timeout=TIMEOUT,connector=connector) as session:
                  warm=['/','/api/public-exams','/api/result-shard/bac/541','/api/search?source=bac&q=00541']
                  for path in warm:
                      await request(session,asyncio.Semaphore(1),path)
                  mixed=[f'/api/result-shard/bac/{n:03d}' for n in (17,41,63,88,104,127,159,203,246,288,327,369,411,458,503,541,627,714,833,947)]
                  plans=[
                      ('home-cdn',['/'],1000,300),
                      ('public-exams',['/api/public-exams'],600,150),
                      ('bac-shard-cached',['/api/result-shard/bac/541'],1000,200),
                      ('bac-mixed-20-shards',mixed,600,120),
                      ('fallback-indexed-search',['/api/search?source=bac&q=00541'],200,40),
                  ]
                  for plan in plans:
                      await run(session,*plan)
                      await asyncio.sleep(1)
          asyncio.run(main())
          PY
          python /tmp/test.py | tee final-load-results.log
      - name: Upload measured results
        uses: actions/upload-artifact@v4
        with:
          name: mauriresults-final-load-results
          path: final-load-results.log
          retention-days: 7
