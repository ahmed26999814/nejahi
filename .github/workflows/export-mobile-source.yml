name: Export mobile source for repository split

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/export-mobile-source.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create latest mobile source archive
        run: |
          mkdir -p .handoff
          tar -czf .handoff/mauriresults-mobile-latest.tar.gz -C mobile-app .
      - name: Commit archive and remove temporary workflow
        run: |
          rm -f .github/workflows/export-mobile-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f .handoff/mauriresults-mobile-latest.tar.gz
          git add -u .github/workflows/export-mobile-source.yml
          git commit -m "Prepare latest mobile source handoff [skip ci]"
          git push
