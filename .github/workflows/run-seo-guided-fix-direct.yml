name: Run SEO Guided Fix Direct

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/run-seo-guided-fix-direct.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Extract and run the prepared patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-seo-domain-guided-search-fix.yml')
          text = workflow.read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          PY", start)
          block = text[start:end]
          lines = []
          for line in block.splitlines():
              lines.append(line[10:] if line.startswith('          ') else line)
          Path('/tmp/apply_fix.py').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          python3 /tmp/apply_fix.py
          rm -f \
            .github/workflows/apply-seo-domain-guided-search-fix.yml \
            .github/workflows/trigger-seo-guided-fix.yml \
            .github/workflows/run-seo-guided-fix-direct.yml

      - name: Install dependencies
        run: npm ci

      - name: Validate build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: npm run build

      - name: Commit the verified fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix guided options, ابريفه naming, and canonical domain"
          git push
