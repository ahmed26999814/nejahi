name: Repair Vercel Live Service

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/repair-vercel-live.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  VERCEL_ORG_ID: team_Hs9izwrJBXYbv6mC5FxhcyNy
  VERCEL_PROJECT_ID: prj_gakC4aJHh0P8f3exGw7xsygjxlaC
  READY_DEPLOYMENT: https://mauriresults-3jw622429-ahmed-abdellahi-madys-projects.vercel.app

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Resume service, disable accidental protection, and restore production domains
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set +e
          LOG=/tmp/vercel-live-repair.log
          : > "$LOG"
          STATUS=failure

          api() {
            method="$1"
            url="$2"
            data="${3:-}"
            if [ -n "$data" ]; then
              curl -sS -X "$method" "$url" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                --data "$data"
            else
              curl -sS -X "$method" "$url" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json"
            fi
          }

          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN is missing" >> "$LOG"
          else
            echo "== Current project state ==" >> "$LOG"
            api GET "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID" \
              | jq '{id,name,live,paused,ssoProtection,passwordProtection,trustedIps,latestDeployments,targets}' >> "$LOG" 2>&1

            echo "== Unpause project ==" >> "$LOG"
            api POST "https://api.vercel.com/v1/projects/$VERCEL_PROJECT_ID/unpause?teamId=$VERCEL_ORG_ID" '{}' >> "$LOG" 2>&1

            echo "== Disable deployment protection ==" >> "$LOG"
            api PATCH "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID" '{"ssoProtection":null,"passwordProtection":null}' \
              | jq '{id,name,live,paused,ssoProtection,passwordProtection}' >> "$LOG" 2>&1

            npm install --global vercel@56.3.0 >> "$LOG" 2>&1
            if [ $? -eq 0 ]; then
              echo "== Promote ready production deployment ==" >> "$LOG"
              vercel promote "$READY_DEPLOYMENT" --yes --token="$VERCEL_TOKEN" --scope=ahmed-abdellahi-madys-projects >> "$LOG" 2>&1

              echo "== Restore aliases ==" >> "$LOG"
              vercel alias set "$READY_DEPLOYMENT" mauri-results.vercel.app --token="$VERCEL_TOKEN" --scope=ahmed-abdellahi-madys-projects >> "$LOG" 2>&1
              vercel alias set "$READY_DEPLOYMENT" mauriresults.vercel.app --token="$VERCEL_TOKEN" --scope=ahmed-abdellahi-madys-projects >> "$LOG" 2>&1
            fi

            echo "== Final project state ==" >> "$LOG"
            api GET "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID" \
              | jq '{id,name,live,paused,ssoProtection,passwordProtection,latestDeployments,targets}' >> "$LOG" 2>&1

            sleep 15
            CODE1=$(curl -L -sS -o /tmp/site1.txt -w '%{http_code}' https://mauri-results.vercel.app/)
            CODE2=$(curl -L -sS -o /tmp/site2.txt -w '%{http_code}' https://mauriresults.vercel.app/)
            echo "mauri-results.vercel.app=$CODE1" >> "$LOG"
            echo "mauriresults.vercel.app=$CODE2" >> "$LOG"
            head -c 300 /tmp/site1.txt >> "$LOG" 2>&1
            echo >> "$LOG"

            if [ "$CODE1" = "200" ] && [ "$CODE2" = "200" ]; then
              STATUS=success
            fi
          fi

          {
            printf 'status=%s\n' "$STATUS"
            tail -n 200 "$LOG"
          } > VERCEL_LIVE_REPAIR_STATUS.txt

          rm -f .github/workflows/repair-vercel-live.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record Vercel live service repair [skip ci]" || true
          git push || true

          test "$STATUS" = "success"
