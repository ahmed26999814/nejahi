name: Preview search diagnostic

on:
  push:
    branches:
      - agent/number-only-search-20k-scale
    paths:
      - scripts/preview-search-diagnostic.mjs
      - .github/workflows/preview-search-diagnostic.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/preview-search-diagnostic.mjs
      - .github/workflows/preview-search-diagnostic.yml

permissions:
  contents: read

env:
  BASE_URL: https://deploy-preview-19--mauri-results.netlify.app

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Inspect preview endpoints
        run: node scripts/preview-search-diagnostic.mjs

      - name: Upload diagnostic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mauriresults-preview-search-diagnostic
          path: preview-search-diagnostic.json
          if-no-files-found: warn
          retention-days: 7
