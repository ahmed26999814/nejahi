name: Publish temporary mobile handoff

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-mobile-handoff.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish temporary archive
        run: |
          test -f .handoff/mauriresults-mobile-latest.tar.gz
          mkdir -p public/handoff
          cp .handoff/mauriresults-mobile-latest.tar.gz public/handoff/mauriresults-mobile-latest.tar.gz
          rm -f .github/workflows/publish-mobile-handoff.yml

      - name: Commit temporary handoff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/handoff/mauriresults-mobile-latest.tar.gz
          git add -u .github/workflows/publish-mobile-handoff.yml
          git commit -m "Publish temporary mobile handoff [skip ci]"
          git push
