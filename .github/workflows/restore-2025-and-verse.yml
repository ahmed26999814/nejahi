name: Restore 2025 exams and add verse banners

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/restore-2025-and-verse.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update home and result UI
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("components/home/HomeApplication.jsx")
          text = path.read_text(encoding="utf-8")

          def replace_once(old, new, label):
              global text
              if old not in text:
                  raise SystemExit(f"Missing expected block: {label}")
              text = text.replace(old, new, 1)

          replace_once(
              '  const examCards = useMemo(() => [...EXAM_CARDS, ...publishedExams], [publishedExams]);',
              '''  const examCards = useMemo(() => {
    const catalog = new Map();
    [...EXAM_CARDS, ...publishedExams].forEach((exam) => {
      const identity = `${cleanText(exam?.source || exam?.id)}:${getExamYear(exam)}`;
      if (!catalog.has(identity)) catalog.set(identity, exam);
    });
    return [...catalog.values()];
  }, [publishedExams]);''',
              "exam catalog dedupe",
          )

          marker = 'function HomeView({ content, homepageBanner, lang, onSelectYear, stats, text, yearCards }) {'
          verse_component = '''function QuranVerseBanner({ compact = false }) {
  const banner = (
    <aside className={`relative overflow-hidden border border-amber-300/20 bg-gradient-to-l from-[#06150d] via-[#0b2a1a] to-[#06150d] text-center text-amber-50 shadow-[0_14px_34px_rgba(0,0,0,.16)] ${compact ? "rounded-[22px] px-3 py-3" : "rounded-[24px] px-4 py-3.5"}`}>
      <span className="absolute -left-8 -top-10 h-24 w-24 rounded-full bg-amber-300/10 blur-2xl" aria-hidden="true" />
      <span className="absolute -bottom-12 right-6 h-24 w-24 rounded-full bg-emerald-300/10 blur-2xl" aria-hidden="true" />
      <div className="relative mx-auto max-w-3xl">
        <span className="mx-auto mb-1.5 grid h-7 w-7 place-items-center rounded-full bg-amber-300/10 text-sm text-amber-200 ring-1 ring-amber-200/20" aria-hidden="true">ﷺ</span>
        <p className={`${compact ? "text-[10px] leading-5 sm:text-xs" : "text-[11px] leading-6 sm:text-sm sm:leading-7"} font-bold`}>
          ﴿ إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ ۚ يَا أَيُّهَا الَّذِينَ آمَنُوا صَلُّوا عَلَيْهِ وَسَلِّمُوا تَسْلِيمًا ﴾
        </p>
        <span className="mt-1 block text-[8px] font-black text-emerald-300/75 sm:text-[9px]">سورة الأحزاب — الآية ٥٦</span>
      </div>
    </aside>
  );

  return compact ? banner : <div className="app-shell pt-3">{banner}</div>;
}

'''
          if verse_component not in text:
              replace_once(marker, verse_component + marker, "Quran verse component")

          replace_once(
              '      <Header activeView={activeView} content={siteContent} lang={lang} onNavigate={openView} onToggleLang={toggleLang} text={text} theme={theme} setTheme={setTheme} />\n\n      {activeView === "home" && (',
              '      <Header activeView={activeView} content={siteContent} lang={lang} onNavigate={openView} onToggleLang={toggleLang} text={text} theme={theme} setTheme={setTheme} />\n      {activeView === "home" && <QuranVerseBanner />}\n\n      {activeView === "home" && (',
              "homepage verse placement",
          )

          replace_once(
              '        </header>\n        <ResultCard onOpenRanking={onOpenRanking} resultBanner={resultBanner} student={student} onShare={onShare} text={text} verificationCode={verificationCode} />',
              '        </header>\n        <QuranVerseBanner compact />\n        <ResultCard onOpenRanking={onOpenRanking} resultBanner={resultBanner} student={student} onShare={onShare} text={text} verificationCode={verificationCode} />',
              "result verse placement",
          )

          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove workflow and commit
        shell: bash
        run: |
          rm -f .github/workflows/restore-2025-and-verse.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore 2025 exams and add Quran verse banners"
          git push
