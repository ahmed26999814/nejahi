name: Trigger SEO Guided Fix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/trigger-seo-guided-fix.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch repair workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run apply-seo-domain-guided-search-fix.yml --repo ahmed26999814/nejahi --ref main
