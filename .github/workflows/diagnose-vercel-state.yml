name: Diagnose Vercel State

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose-vercel-state.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  TEAM_ID: team_Hs9izwrJBXYbv6mC5FxhcyNy
  PROJECT_ID: prj_gakC4aJHh0P8f3exGw7xsygjxlaC
  DEPLOYMENT_ID: dpl_5zNGRsRDJcFJAMQZ4B5MGZJy5uhk

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Capture relevant Vercel state
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set +e
          AUTH="Authorization: Bearer $VERCEL_TOKEN"
          OUT=VERCEL_STATE_DIAGNOSTIC.txt
          : > "$OUT"

          curl -sS -H "$AUTH" "https://api.vercel.com/v9/projects/$PROJECT_ID?teamId=$TEAM_ID" -o /tmp/project.json
          echo '== project keys ==' >> "$OUT"
          jq -r 'keys[]' /tmp/project.json >> "$OUT"
          echo '== project state ==' >> "$OUT"
          jq '{id,name,live,paused,softBlock,blocked,disabled,abuse,ssoProtection,passwordProtection,trustedIps,security,protectionBypass,targets,latestDeployments}' /tmp/project.json >> "$OUT"

          curl -sS -H "$AUTH" "https://api.vercel.com/v2/teams/$TEAM_ID" -o /tmp/team.json
          echo '== team state ==' >> "$OUT"
          jq '{id,name,slug,plan,softBlock,blocked,disabled,abuse,billing,status,resourceConfig,features}' /tmp/team.json >> "$OUT"

          curl -sS -H "$AUTH" "https://api.vercel.com/v13/deployments/$DEPLOYMENT_ID?teamId=$TEAM_ID" -o /tmp/deployment.json
          echo '== deployment state ==' >> "$OUT"
          jq '{id,url,readyState,readySubstate,target,private,alias,aliasError,blocked,softBlock,protectionBypass,projectSettings}' /tmp/deployment.json >> "$OUT"

          echo '== unpause response ==' >> "$OUT"
          curl -sS -w '\nHTTP=%{http_code}\n' -X POST \
            -H "$AUTH" -H 'Content-Type: application/json' \
            "https://api.vercel.com/v1/projects/$PROJECT_ID/unpause?teamId=$TEAM_ID" \
            --data '{}' >> "$OUT"

          rm -f .github/workflows/diagnose-vercel-state.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record Vercel state diagnostic [skip ci]" || true
          git push || true
