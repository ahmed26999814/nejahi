name: Number-only search scale test

on:
  push:
    branches:
      - agent/number-only-search-20k-scale
    paths:
      - scripts/final-number-search-scale-test.mjs
      - .github/workflows/number-search-scale-test.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/final-number-search-scale-test.mjs
      - .github/workflows/number-search-scale-test.yml

permissions:
  contents: read

env:
  BASE_URL: https://deploy-preview-19--mauri-results.netlify.app
  TIMEOUT_MS: "10000"
  REPORT_FILE: number-search-scale-report.json

jobs:
  scale-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare final test values
        run: sed -i 's/99999999999999999999/999999/g' scripts/final-number-search-scale-test.mjs

      - name: Run functional and scale tests
        run: node scripts/final-number-search-scale-test.mjs

      - name: Upload scale report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mauriresults-number-search-scale-report
          path: number-search-scale-report.json
          if-no-files-found: warn
          retention-days: 14
