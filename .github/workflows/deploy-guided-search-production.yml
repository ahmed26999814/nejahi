name: Deploy Guided Search Production

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-guided-search-production.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mauriresults-guided-search-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_Hs9izwrJBXYbv6mC5FxhcyNy
  VERCEL_PROJECT_ID: prj_gakC4aJHh0P8f3exGw7xsygjxlaC

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies and Vercel CLI
        run: |
          npm ci
          npm install --global vercel@56.3.0

      - name: Link production project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --scope=ahmed-abdellahi-madys-projects

      - name: Build latest source with trusted variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: vercel build --prod --token="$VERCEL_TOKEN" --scope=ahmed-abdellahi-madys-projects

      - name: Reject invalid build variables
        shell: bash
        run: |
          set -euo pipefail
          ! grep -RIl --exclude='*.map' '\[SENSITIVE\]\|\[REDACTED\]' .vercel/output 2>/dev/null | grep -q .

      - name: Deploy prebuilt production output
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          url=$(vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN" --scope=ahmed-abdellahi-madys-projects)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployment: $url"

      - name: Verify production behavior
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6 7 8; do
            old_headers=$(curl -sS -I https://mauri-results.vercel.app/ || true)
            new_html=$(curl -fsSL https://mauriresults.vercel.app/ || true)
            robots=$(curl -fsSL https://mauriresults.vercel.app/robots.txt || true)
            sitemap=$(curl -fsSL https://mauriresults.vercel.app/sitemap.xml || true)
            options=$(curl -fsSL 'https://mauriresults.vercel.app/api/uploaded-concours-locations?source=upload%3Aconcour_2026&level=wilaya' || true)
            chunk_urls=$(printf '%s' "$new_html" | grep -oE '/_next/static/chunks/[^" ]+\.js' | sort -u || true)
            chunks=""
            while IFS= read -r chunk; do
              [ -z "$chunk" ] && continue
              chunks="$chunks$(curl -fsSL "https://mauriresults.vercel.app$chunk" || true)"
            done <<< "$chunk_urls"

            if printf '%s' "$old_headers" | grep -qiE '^location: https://mauriresults\.vercel\.app/' \
              && printf '%s' "$new_html" | grep -q 'تم فتح نتائج ابريفه وكونكور 2026' \
              && printf '%s' "$new_html" | grep -q 'https://mauriresults.vercel.app' \
              && printf '%s' "$robots" | grep -q 'https://mauriresults.vercel.app/sitemap.xml' \
              && printf '%s' "$sitemap" | grep -q '<loc>https://mauriresults.vercel.app' \
              && printf '%s' "$options" | grep -q '"options"' \
              && printf '%s' "$chunks" | grep -q 'البحث بالخيارات'; then
              echo "Production verification passed"
              exit 0
            fi
            echo "Attempt $attempt pending"
            sleep 12
          done
          echo "Production verification failed" >&2
          exit 1

      - name: Remove one-shot workflow
        if: always()
        shell: bash
        run: |
          set -e
          rm -f .github/workflows/deploy-guided-search-production.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove one-shot guided search deploy workflow [skip ci]" || true
          git push || true
