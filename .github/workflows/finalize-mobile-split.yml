name: Finalize mobile repository split

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/finalize-mobile-split.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Keep website and remove mobile source coupling
        shell: bash
        run: |
          test -f public/apk/MauriResults.apk
          test -f public/apk/version.json
          rm -rf mobile-app
          rm -f .github/workflows/build-android-apk.yml
          rm -rf .handoff
          rm -rf public/handoff
          rm -f .github/workflows/finalize-mobile-split.yml

      - name: Commit independent website repository
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Separate native mobile app from website repository"
          git push
