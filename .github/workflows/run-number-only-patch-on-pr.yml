name: Run number-only hardening on PR

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-build-and-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply patch from temporary workflow
        id: patch
        shell: bash
        run: |
          set +e
          python3 - <<'PYEXTRACT' > /tmp/hardening-patch.log 2>&1
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/apply-number-only-publish-hardening.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          if marker not in workflow or "\n          PY\n" not in workflow:
              raise SystemExit('Unable to locate embedded hardening script')
          script = workflow.split(marker, 1)[1].split("\n          PY\n", 1)[0]
          script = textwrap.dedent(script)
          script = script.replace(
              'if "EXAM_CARDS" in home or "YEAR_CARDS" in home:\n    raise SystemExit("Static catalog references remain in HomeApplication")',
              'home = replace_once(home, \'function ExamSelector({ examCards = EXAM_CARDS,\', \'function ExamSelector({ examCards = [],\', "exam selector dynamic default")\nhome = replace_once(home, \'function ToppersPage({ examCards = EXAM_CARDS,\', \'function ToppersPage({ examCards = [],\', "toppers dynamic default")\nif "EXAM_CARDS" in home or "YEAR_CARDS" in home:\n    remaining = [(index + 1, line.strip()) for index, line in enumerate(home.splitlines()) if "EXAM_CARDS" in line or "YEAR_CARDS" in line]\n    raise SystemExit(f"Static catalog references remain: {remaining}")',
          )
          exec(compile(script, '<number-only-hardening>', 'exec'))
          PYEXTRACT
          status=$?
          set -e
          cat /tmp/hardening-patch.log
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-patch-log
          path: /tmp/hardening-patch.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop after patch failure
        if: steps.patch.outputs.status != '0'
        run: exit 1

      - name: Install dependencies
        run: npm ci

      - name: Build production application
        run: npm run build

      - name: Commit validated changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-number-only-publish-hardening.yml .github/workflows/run-number-only-patch-on-pr.yml
          git add components/home/HomeApplication.jsx components/ui/BacTopperTrackOrder.jsx components/home/yearCards.js app/api/public-exams/route.ts
          git commit -m "تحسين البحث الرقمي ودقة النشر وتحمل الضغط [skip ci]"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
