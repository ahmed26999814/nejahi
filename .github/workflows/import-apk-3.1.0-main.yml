name: One-shot import MauriResults APK 3.1.0

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/import-apk-3.1.0-main.yml"

permissions:
  contents: write

jobs:
  import-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download verified APK artifact
        shell: bash
        env:
          APK_ZIP_URL: "https://sdmntprnortheu.oaiusercontent.com/files/00000000-8eb8-81f4-b637-089ec12e4d56/raw?se=2026-07-20T14:38:25Z&sp=r&sv=2026-02-06&sr=b&scid=e8612925-1b27-5c27-8bcc-bfdc2e5c4745&skoid=e32cbaad-a1eb-4299-9f16-1b364ab43781&sktid=a48cca56-e6da-484e-a814-9c849652bcb3&skt=2026-07-20T07:59:26Z&ske=2026-07-22T07:59:26Z&sks=b&skv=2026-02-06&sig=U7QTX3CTfnDWKcZBQDcmwvzLzZZ/yZGCDDAW0fonI0c%3D"
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 "$APK_ZIP_URL" --output /tmp/mauriresults-3.1.0.zip
          rm -rf /tmp/mauriresults-apk
          mkdir -p /tmp/mauriresults-apk public/apk
          unzip -q /tmp/mauriresults-3.1.0.zip -d /tmp/mauriresults-apk
          cp /tmp/mauriresults-apk/app-release.apk public/apk/MauriResults-3.1.0.apk
          rm -f public/apk/MauriResults.apk
          echo "2ba464b488c7b4ecd39c6b33ee975ef70bc68991c77e926f64fd6a58c9174ea1  public/apk/MauriResults-3.1.0.apk" | sha256sum --check --strict

      - name: Commit the new APK
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/apk/MauriResults-3.1.0.apk public/apk/MauriResults.apk
          git commit -m "Publish MauriResults APK 3.1.0 [skip ci]" || exit 0
          git push origin HEAD:main
