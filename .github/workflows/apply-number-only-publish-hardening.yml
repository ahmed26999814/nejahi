name: Apply number-only publish hardening

on:
  push:
    branches:
      - perf/number-only-publish-hardening
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: perf/number-only-publish-hardening
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply focused hardening patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          def regex_once(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"{label}: expected one regex match, found {count}")
              return updated

          home_path = Path("components/home/HomeApplication.jsx")
          home = home_path.read_text()

          home = replace_once(
              home,
              'import AnalyticsPage from "../analytics/AnalyticsPage";',
              'import dynamic from "next/dynamic";',
              "lazy analytics import",
          )
          home = replace_once(
              home,
              'import { Toaster, toast } from "sonner";\n',
              'import { Toaster, toast } from "sonner";\n\nconst AnalyticsPage = dynamic(() => import("../analytics/AnalyticsPage"), { ssr: false });\n',
              "analytics dynamic component",
          )
          home = replace_once(
              home,
              'const BAC_TRACK_PRIORITY = ["SN", "M", "LO", "LM"];',
              'const BAC_TRACK_PRIORITY = ["SN", "M", "LO", "LM", "TM", "TS", "LA"];',
              "complete bac order",
          )
          home = regex_once(
              home,
              r'\nconst TABLE_BY_SOURCE = \{.*?\n\};\n',
              '\n',
              "remove client table map",
          )
          home = regex_once(
              home,
              r'\nconst EXAM_CARDS = \[.*?\n\];\n\nconst YEAR_CARDS = \[.*?\n\];\n',
              '\n',
              "remove duplicated static catalogs",
          )

          replacements = {
              'searchPlaceholder: "أدخل رقم المترشح أو الاسم الكامل"': 'searchPlaceholder: "أدخل رقم المترشح"',
              'enterQuery: "يرجى إدخال رقم المترشح أو الاسم."': 'enterQuery: "يرجى إدخال رقم المترشح."',
              'shortQuery: "أدخل رقما أو اسما من حرفين على الأقل."': 'shortQuery: "أدخل رقم مترشح صحيحًا من رقمين على الأقل."',
              'notFound: "لم يتم العثور على نتيجة بهذا الرقم أو الاسم."': 'notFound: "لم يتم العثور على نتيجة بهذا الرقم."',
              'sessionNotFound: "لم يتم العثور على مترشح مؤهل للدورة بهذا الرقم أو الاسم."': 'sessionNotFound: "لم يتم العثور على مترشح مؤهل للدورة بهذا الرقم."',
              'searchPlaceholder: "Entrez le numéro ou le nom complet"': 'searchPlaceholder: "Entrez le numéro du candidat"',
              'enterQuery: "Veuillez saisir le numéro ou le nom."': 'enterQuery: "Veuillez saisir le numéro du candidat."',
              'shortQuery: "Saisissez au moins deux caractères."': 'shortQuery: "Saisissez un numéro valide d’au moins deux chiffres."',
              'notFound: "Aucun résultat trouvé avec ce numéro ou ce nom."': 'notFound: "Aucun résultat trouvé avec ce numéro."',
              'sessionNotFound: "Aucun candidat admissible à la session avec ce numéro ou ce nom."': 'sessionNotFound: "Aucun candidat admissible à la session avec ce numéro."',
          }
          for old, new in replacements.items():
              home = replace_once(home, old, new, old)

          home = replace_once(
              home,
              '    shortQuery: "أدخل رقم مترشح صحيحًا من رقمين على الأقل.",\n',
              '    shortQuery: "أدخل رقم مترشح صحيحًا من رقمين على الأقل.",\n    invalidCandidateNumber: "رقم المترشح يجب أن يحتوي على أرقام فقط.",\n',
              "arabic invalid-number copy",
          )
          home = replace_once(
              home,
              '    shortQuery: "Saisissez un numéro valide d’au moins deux chiffres.",\n',
              '    shortQuery: "Saisissez un numéro valide d’au moins deux chiffres.",\n    invalidCandidateNumber: "Le numéro du candidat doit contenir uniquement des chiffres.",\n',
              "french invalid-number copy",
          )

          clean_text = '''function cleanText(value) {
            return String(value ?? "").trim();
          }
          '''
          track_helpers = '''function cleanText(value) {
            return String(value ?? "").trim();
          }

          function normalizedTrackCode(value) {
            return cleanText(value).toUpperCase().replace(/[^A-Z0-9]/g, "");
          }

          function bacTrackPriorityIndex(value) {
            const index = BAC_TRACK_PRIORITY.indexOf(normalizedTrackCode(value));
            return index === -1 ? BAC_TRACK_PRIORITY.length : index;
          }

          function compareBacTracks(left, right) {
            const priorityDifference = bacTrackPriorityIndex(left) - bacTrackPriorityIndex(right);
            return priorityDifference || cleanText(left).localeCompare(cleanText(right), "fr");
          }
          '''
          home = replace_once(home, clean_text, track_helpers, "shared bac comparator")

          home = replace_once(
              home,
              '''  return [...new Set(pool.map((student) => cleanText(student.track)).filter(Boolean))]
              .sort((a, b) => a.localeCompare(b, "ar"))
          ''',
              '''  return [...new Set(pool.map((student) => cleanText(student.track)).filter(Boolean))]
              .sort(compareBacTracks)
          ''',
              "topper group order",
          )
          home = regex_once(
              home,
              r'function sortBacTrackStats\(rows = \[\]\) \{.*?\n\}',
              '''function sortBacTrackStats(rows = []) {
            return [...rows].sort((a, b) => compareBacTracks(a.label, b.label));
          }''',
              "bac analytics order",
          )
          home = replace_once(
              home,
              '    .sort((a, b) => a.track.localeCompare(b.track, "ar"));',
              '    .sort((a, b) => compareBacTracks(a.track, b.track));',
              "student group order",
          )

          home = replace_once(
              home,
              'function buildPublishedExamCards(rows = []) {',
              '''function publishedExamId(row) {
            const source = cleanText(row?.source_key);
            const year = String(row?.year || "").match(/20\\d{2}/)?.[0] || "results";
            const builtInIds = {
              bac: "bac",
              brevet: "brevet",
              concours: "concours",
              excellence_1as: "excellence-1as",
              bac_session: "bac-session",
              bac_2026: "bac",
              brevet_2026: "brevet",
              concours_2026: "concours",
              excellence_1as_2026: "excellence-1as",
              bac_session_2026: "bac-session",
            };
            return builtInIds[source] ? `${builtInIds[source]}-${year}` : `upload-${row.table_name}`;
          }

          function buildPublishedExamCards(rows = []) {''',
              "stable dynamic exam ids",
          )
          home = replace_once(
              home,
              '    .filter((row) => row?.table_name && row?.source_key && row?.number_column && row?.name_column && row?.score_column)',
              '    .filter((row) => row?.table_name && row?.source_key && row?.number_column && row?.score_column)',
              "number-only publication requirements",
          )
          home = replace_once(home, '      id: "upload-" + row.table_name,', '      id: publishedExamId(row),', "dynamic exam id use")
          home = replace_once(
              home,
              '        track: row.track_column,',
              '        track: /bepc|brevet|concours|c1as|كونكور|ابريف|بريف/i.test(examIdentity) ? null : row.track_column,',
              "ignore invalid non-track columns",
          )

          old_catalog_state = '''  const examCards = useMemo(() => [...EXAM_CARDS, ...publishedExams], [publishedExams]);
            const yearCards = useMemo(() => {
              const baseByYear = new Map(YEAR_CARDS.map((year) => [year.id.replace("year-", ""), year]));
              const years = [...new Set(["2025", "2026", ...examCards.map(getExamYear)])]
                .filter((year) => /^20\\d{2}$/.test(year))
                .sort((a, b) => Number(a) - Number(b));
              return years.map((yearValue) => {
                const base = baseByYear.get(yearValue) || {
                  id: `year-${yearValue}`,
                  title: { ar: `نتائج مسابقات ${yearValue}`, fr: `Résultats des concours ${yearValue}` },
                  description: { ar: `النتائج المنشورة لسنة ${yearValue}.`, fr: `Résultats publiés pour ${yearValue}.` },
                  tone: "green",
                  icon: <GraduationIcon />,
                };
                const available = examCards.some((exam) => exam.available && getExamYear(exam) === yearValue);
                return { ...base, id: `year-${yearValue}`, available };
              });
            }, [examCards]);'''
          new_catalog_state = '''  const examCards = publishedExams;
            const yearCards = useMemo(() => {
              return [...new Set(examCards.map(getExamYear))]
                .filter((year) => /^20\\d{2}$/.test(year))
                .sort((a, b) => Number(b) - Number(a))
                .map((yearValue) => ({
                  id: `year-${yearValue}`,
                  title: { ar: `نتائج المسابقات ${yearValue}`, fr: `Résultats des concours ${yearValue}` },
                  description: { ar: `النتائج المنشورة والمتاحة لسنة ${yearValue}.`, fr: `Résultats publiés et disponibles pour ${yearValue}.` },
                  available: examCards.some((exam) => exam.available && getExamYear(exam) === yearValue),
                }));
            }, [examCards]);'''
          home = replace_once(home, old_catalog_state, new_catalog_state, "data-driven catalog state")
          home = replace_once(home, '  const [selectedYearId, setSelectedYearId] = useState("year-2025");', '  const [selectedYearId, setSelectedYearId] = useState("year-2026");', "current year default")

          old_analytics_effects = '''  useEffect(() => {
              loadAnalyticsSource("bac");
            }, []);

            useEffect(() => {
              if (selectedExam?.source) loadAnalyticsSource(selectedExam.source);
            }, [selectedExam?.source]);'''
          new_analytics_effect = '''  useEffect(() => {
              if ((activeView === "analytics" || activeView === "toppers") && selectedExam?.source) {
                loadAnalyticsSource(selectedExam.source);
              }
            }, [activeView, selectedExam?.source]);'''
          home = replace_once(home, old_analytics_effects, new_analytics_effect, "lazy analytics requests")

          old_suggestions = '''  const suggestions = useMemo(() => {
              const value = cleanText(query).toLowerCase();
              if (!selectedExam?.available || selectedExam.source === "concours" || value.length < 2 || resultPageOpen || matches.length) return [];
              return searchPool
                .filter((student) => cleanText(student.id).toLowerCase().includes(value) || cleanText(student.name).toLowerCase().includes(value))
                .slice(0, 5);
            }, [matches.length, query, resultPageOpen, searchPool, selectedExam]);'''
          new_suggestions = '''  const suggestions = useMemo(() => {
              const value = cleanText(query);
              if (!selectedExam?.available || selectedExam.source === "concours" || !/^\\d{2,20}$/.test(value) || resultPageOpen || matches.length) return [];
              return searchPool
                .filter((student) => cleanText(student.id).includes(value))
                .slice(0, 5);
            }, [matches.length, query, resultPageOpen, searchPool, selectedExam]);'''
          home = replace_once(home, old_suggestions, new_suggestions, "number-only suggestions")

          old_validation = '''    if (value.length < 2) {
                setError(text.shortQuery);
                return;
              }'''
          new_validation = '''    if (value.length < 2) {
                setError(text.shortQuery);
                return;
              }
              if (!/^\\d{2,20}$/.test(value)) {
                setError(text.invalidCandidateNumber || text.shortQuery);
                return;
              }'''
          home = replace_once(home, old_validation, new_validation, "number-only validation")

          home = replace_once(
              home,
              '    return [...new Set(searchPool.map((student) => cleanText(student.track)).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ar"));',
              '    return [...new Set(searchPool.map((student) => cleanText(student.track)).filter(Boolean))].sort(compareBacTracks);',
              "bac filter order",
          )

          home = regex_once(
              home,
              r'\nasync function fetchAllResults\(\) \{.*?\nasync function fetchConcoursLocations\(\) \{',
              '\nasync function fetchConcoursLocations() {',
              "remove full-table result loaders",
          )
          home = regex_once(
              home,
              r'\nasync function fetchExcellenceResults\(\) \{.*?\nasync function searchResults\(query, exam\) \{',
              '\nasync function searchResults(query, exam) {',
              "remove excellence full-table loader",
          )
          home = regex_once(
              home,
              r'\n  function isExamDataLoaded\(exam\) \{.*?\n  async function openView\(view\) \{',
              '\n  async function openView(view) {',
              "remove obsolete browser bulk loader",
          )
          home = regex_once(
              home,
              r'  async function openExam\(exam\) \{\n    console\.log\("\[MauriResults Select Exam\]", \{.*?\n    \}\);\n',
              '  async function openExam(exam) {\n',
              "remove exam selection logging",
          )
          home = replace_once(
              home,
              '    setActiveView("exam");\n    loadAnalyticsSource(exam.source);\n    writeHashRoute(exam.id,',
              '    setActiveView("exam");\n    writeHashRoute(exam.id,',
              "avoid analytics on search navigation",
          )

          home = replace_once(
              home,
              '      yearCards={typeof yearCards !== "undefined" ? yearCards : YEAR_CARDS}',
              '      yearCards={Array.isArray(yearCards) ? yearCards : []}',
              "home year fallback",
          )
          home = regex_once(
              home,
              r'\nfunction YearCards\(\{ lang, onSelectYear, text \}\) \{.*?\n\}\n\nfunction SiteBanner',
              '\nfunction SiteBanner',
              "remove obsolete year component",
          )
          home = replace_once(home, 'function YearPage({ currentYearId = "year-2025", examCards = EXAM_CARDS,', 'function YearPage({ currentYearId = "year-2025", examCards = [],', "year page dynamic default")
          home = replace_once(home, 'function CompetitionCards({ currentYearId = "year-2025", examCards = EXAM_CARDS,', 'function CompetitionCards({ currentYearId = "year-2025", examCards = [],', "competition cards dynamic default")

          if "EXAM_CARDS" in home or "YEAR_CARDS" in home:
              raise SystemExit("Static catalog references remain in HomeApplication")
          home_path.write_text(home)

          track_path = Path("components/ui/BacTopperTrackOrder.jsx")
          track = track_path.read_text()
          track = replace_once(
              track,
              '''  ["LM", { order: 3, meaning: "الآداب العصرية" }],
          ]);''',
              '''  ["LM", { order: 3, meaning: "الآداب العصرية" }],
            ["TM", { order: 4, meaning: "التقنية" }],
            ["TS", { order: 5, meaning: "الهندسة الكهربائية" }],
            ["LA", { order: 6, meaning: "اللغات" }],
          ]);''',
              "complete visual bac order",
          )
          track_path.write_text(track)

          api_path = Path("app/api/public-exams/route.ts")
          api = api_path.read_text()
          api = replace_once(
              api,
              '  const uploaded = String(exam.source_key || "").startsWith("upload:");\n  return {',
              '  const uploaded = String(exam.source_key || "").startsWith("upload:");\n  const kind = examKind(exam);\n  return {',
              "catalog kind normalization",
          )
          api = replace_once(
              api,
              '    ...exam,\n    description_ar:',
              '    ...exam,\n    track_column: kind === "brevet" || kind === "concours" ? null : exam.track_column,\n    description_ar:',
              "ignore invalid non-track metadata",
          )
          api = regex_once(
              api,
              r'function sortExams\(rows: ReadonlyArray<Record<string, unknown>>\) \{.*?\n\}',
              '''function sortExams(rows: ReadonlyArray<Record<string, unknown>>) {
            const kindPriority: Record<string, number> = { bac: 0, brevet: 1, concours: 2, excellence: 3, session: 4, results: 5 };
            return [...rows].sort((a, b) => {
              const byYear = yearNumber(b.year) - yearNumber(a.year);
              if (byYear) return byYear;
              const byKind = (kindPriority[examKind(a)] ?? 99) - (kindPriority[examKind(b)] ?? 99);
              if (byKind) return byKind;
              return String(b.created_at || "").localeCompare(String(a.created_at || ""));
            });
          }''',
              "future-proof exam ordering",
          )
          api = replace_once(
              api,
              '''function mobileCatalog(uploadedRows: ReadonlyArray<Record<string, unknown>>) {
            const bySource = new Map<string, Record<string, unknown>>();
            for (const exam of LEGACY_2025_EXAMS.map(cleanExam)) bySource.set(String(exam.source_key), exam);
            for (const exam of uploadedRows) bySource.set(String(exam.source_key), exam);
            return sortExams([...bySource.values()]);
          }''',
              '''function publicCatalog(uploadedRows: ReadonlyArray<Record<string, unknown>>) {
            const byIdentity = new Map<string, Record<string, unknown>>();
            const identity = (exam: Record<string, unknown>) => `${String(exam.source_key || "")}:${String(exam.year || yearNumber(exam.title_ar) || "")}`;
            for (const exam of LEGACY_2025_EXAMS.map(cleanExam)) byIdentity.set(identity(exam), exam);
            for (const exam of uploadedRows) byIdentity.set(identity(exam), exam);
            return sortExams([...byIdentity.values()]);
          }''',
              "multi-year public catalog",
          )
          api = replace_once(api, '  const exams = client === "mobile" ? mobileCatalog(result.rows) : result.rows;', '  const exams = publicCatalog(result.rows);', "single resilient catalog source")
          api_path.write_text(api)

          years_path = Path("components/home/yearCards.js")
          years = years_path.read_text()
          years = replace_once(
              years,
              '      const available = yearValue === "2025" || propAvailability === true;',
              '      const available = propAvailability === undefined ? card.available === true : propAvailability === true;',
              "year publication truth",
          )
          years_path.write_text(years)
          PY

      - name: Install dependencies
        run: npm ci

      - name: Build production application
        run: npm run build

      - name: Commit validated changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-number-only-publish-hardening.yml
          git add components/home/HomeApplication.jsx components/ui/BacTopperTrackOrder.jsx components/home/yearCards.js app/api/public-exams/route.ts
          git commit -m "تحسين البحث الرقمي ودقة النشر وتحمل الضغط [skip ci]"
          git push origin HEAD:perf/number-only-publish-hardening
