name: Deploy Current Production

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-current-production.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  VERCEL_ORG_ID: team_Hs9izwrJBXYbv6mC5FxhcyNy
  VERCEL_PROJECT_ID: prj_gakC4aJHh0P8f3exGw7xsygjxlaC

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Verify Vercel token
        id: token
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          test -n "$VERCEL_TOKEN" || { echo "VERCEL_TOKEN secret is missing"; exit 1; }
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          printf 'deployment_url=%s\n' "$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$DEPLOYMENT_URL" > /tmp/deployment-url.txt

      - name: Record outcome and remove workflow
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          TOKEN_AVAILABLE: ${{ steps.token.outputs.available }}
        run: |
          URL=""
          if [ -f /tmp/deployment-url.txt ]; then URL=$(cat /tmp/deployment-url.txt); fi
          printf 'status=%s\nvercel_token_available=%s\ndeployment_url=%s\ncommit=%s\n' "$JOB_STATUS" "${TOKEN_AVAILABLE:-false}" "$URL" "$GITHUB_SHA" > VERCEL_DEPLOYMENT_STATUS.txt
          rm -f .github/workflows/deploy-current-production.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record production deployment outcome [skip ci]" || true
          git push || true
