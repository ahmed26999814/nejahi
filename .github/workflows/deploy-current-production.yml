name: Deploy Current Production

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-current-production.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  VERCEL_ORG_ID: team_Hs9izwrJBXYbv6mC5FxhcyNy
  VERCEL_PROJECT_ID: prj_gakC4aJHh0P8f3exGw7xsygjxlaC

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Check deployment credentials
        id: credentials
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "VERCEL_TOKEN secret is missing"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Record outcome and clean workflow
        if: always()
        shell: bash
        env:
          TOKEN_AVAILABLE: ${{ steps.credentials.outputs.available }}
          JOB_STATUS: ${{ job.status }}
        run: |
          printf 'status=%s\nvercel_token_available=%s\ncommit=%s\n' "$JOB_STATUS" "${TOKEN_AVAILABLE:-false}" "$GITHUB_SHA" > VERCEL_DEPLOYMENT_STATUS.txt
          rm -f .github/workflows/deploy-current-production.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record production deployment outcome [skip ci]"
          git push
