name: MauriResults controlled load test

on:
  push:
    branches:
      - test/load-capacity-20260721
  workflow_dispatch:

permissions:
  contents: read

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout test branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install load-test dependency
        run: python -m pip install --disable-pip-version-check aiohttp==3.10.11 brotli==1.1.0

      - name: Run staged controlled test
        env:
          TARGET_URL: https://mauri-results.vercel.app
        run: python scripts/load_test.py

      - name: Publish summary
        if: always()
        run: |
          if [ -f load-test-summary.md ]; then
            cat load-test-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mauriresults-load-test-results
          path: |
            load-test-results.json
            load-test-summary.md
          if-no-files-found: warn
          retention-days: 3
