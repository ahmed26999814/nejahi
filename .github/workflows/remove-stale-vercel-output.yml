name: Remove Stale Vercel Output

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/remove-stale-vercel-output.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove committed Vercel artifacts and prevent recurrence
        shell: bash
        run: |
          set -euo pipefail

          git rm -r --ignore-unmatch .vercel

          python3 - <<'PY'
          from pathlib import Path

          def ensure_lines(path, required):
              file = Path(path)
              existing = file.read_text(encoding="utf-8").splitlines() if file.exists() else []
              normalized = [line.rstrip() for line in existing]
              for line in required:
                  if line not in normalized:
                      normalized.append(line)
              file.write_text("\n".join(normalized).rstrip() + "\n", encoding="utf-8")

          ensure_lines(".gitignore", [".vercel/"])
          ensure_lines(".vercelignore", [".vercel", ".vercel/**"])
          PY

          rm -f \
            VERCEL_DEPLOYMENT_STATUS.txt \
            VERCEL_ALIAS_RESTORE_STATUS.txt \
            VERCEL_ALIAS_SET_STATUS.txt \
            VERCEL_LIVE_REPAIR_STATUS.txt \
            VERCEL_STATE_DIAGNOSTIC.txt

          rm -f .github/workflows/remove-stale-vercel-output.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove stale Vercel output and force clean Next.js build"
          git push
