name: Build and publish MauriResults native APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile-app/**"
      - ".github/workflows/build-android-apk.yml"

permissions:
  contents: write

concurrency:
  group: mauriresults-native-android
  cancel-in-progress: true

jobs:
  build-native-android:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses and install SDK 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Restore native mobile source
        if: ${{ hashFiles('mobile-app/package.json') == '' }}
        shell: bash
        run: |
          mkdir -p mobile-app
          tar -xzf .bootstrap/mauriresults-mobile-source.tar.gz -C mobile-app

      - name: Install JavaScript dependencies
        working-directory: mobile-app
        run: npm install --no-audit --no-fund

      - name: Generate branded Android assets
        shell: bash
        run: |
          python3 -m pip install --disable-pip-version-check pillow
          python3 mobile-app/scripts/generate_assets.py

      - name: Validate TypeScript and native bundle
        working-directory: mobile-app
        shell: bash
        run: |
          npm run typecheck
          npx expo export --platform android --output-dir dist --clear
          rm -rf dist

      - name: Generate native Android project
        working-directory: mobile-app
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build installable native release APK
        working-directory: mobile-app/android
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare direct-download files
        shell: bash
        env:
          BUILD_SHA: ${{ github.sha }}
        run: |
          mkdir -p public/apk
          cp mobile-app/android/app/build/outputs/apk/release/app-release.apk public/apk/MauriResults.apk
          python3 - <<'PY'
          from datetime import datetime, timezone
          from hashlib import sha256
          from pathlib import Path
          import json
          import os

          apk = Path("public/apk/MauriResults.apk")
          digest = sha256(apk.read_bytes()).hexdigest()
          metadata = {
              "name": "MauriResults",
              "package": "com.mauriresults.app",
              "version": "2.0.0",
              "versionCode": 2,
              "minimumAndroid": "7.0",
              "sizeBytes": apk.stat().st_size,
              "sizeMB": round(apk.stat().st_size / 1024 / 1024, 2),
              "sha256": digest,
              "buildCommit": os.environ.get("BUILD_SHA", ""),
              "publishedAt": datetime.now(timezone.utc).isoformat(),
              "download": "/apk/MauriResults.apk",
              "native": True,
              "framework": "React Native + Expo",
              "features": [
                  "native-search",
                  "offline-saved-results",
                  "search-history",
                  "share-result",
                  "pdf-export",
                  "analytics",
                  "local-new-exam-notifications",
                  "arabic-french",
                  "light-dark-theme"
              ]
          }
          Path("public/apk/version.json").write_text(
              json.dumps(metadata, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload native APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MauriResults-Native-Android-2.0.0
          path: |
            public/apk/MauriResults.apk
            public/apk/version.json
          retention-days: 30
          if-no-files-found: error

      - name: Publish native APK to the website
        shell: bash
        run: |
          cp public/apk/MauriResults.apk /tmp/MauriResults.apk
          cp public/apk/version.json /tmp/mauriresults-version.json
          git fetch origin main
          git reset --hard origin/main
          mkdir -p public/apk
          cp /tmp/MauriResults.apk public/apk/MauriResults.apk
          cp /tmp/mauriresults-version.json public/apk/version.json
          rm -f public/apk/build-status.json
          rm -f .bootstrap/mauriresults-mobile-source.tar.gz
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile-app
          git add -u .bootstrap/mauriresults-mobile-source.tar.gz
          git add -f public/apk/MauriResults.apk public/apk/version.json
          git add -u public/apk/build-status.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Native APK is already current."
            exit 0
          fi
          git commit -m "Publish MauriResults native Android APK [skip ci]"
          git push origin HEAD:main

      - name: Report failed native APK build
        if: failure()
        shell: bash
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          BUILD_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import json
          import os

          status = {
              "status": "failed",
              "type": "native-react-native-expo",
              "workflowRunId": os.environ.get("RUN_ID", ""),
              "attempt": os.environ.get("RUN_ATTEMPT", ""),
              "buildCommit": os.environ.get("BUILD_SHA", ""),
              "reportedAt": datetime.now(timezone.utc).isoformat()
          }
          Path("/tmp/apk-build-status.json").write_text(
              json.dumps(status, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          git fetch origin main
          git reset --hard origin/main
          mkdir -p public/apk
          cp /tmp/apk-build-status.json public/apk/build-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/apk/build-status.json
          git commit -m "Report failed MauriResults native APK build [skip ci]"
          git push origin HEAD:main
