name: MauriResults Load Threshold Test

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/load-threshold-test.mjs
      - .github/workflows/load-threshold-test.yml

permissions:
  contents: read

env:
  BASE_URL: https://mauri-results.vercel.app
  TIMEOUT_MS: "7000"

jobs:
  threshold-test:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run progressive read-only threshold test
        run: node scripts/load-threshold-test.mjs

      - name: Upload threshold report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mauriresults-load-threshold-report
          path: load-threshold-report.json
          if-no-files-found: warn
          retention-days: 7
