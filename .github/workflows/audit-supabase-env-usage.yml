name: Audit Supabase Env Usage

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/audit-supabase-env-usage.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Record environment references
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '# Supabase environment references'
            echo
            grep -RIn --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.next --exclude='*.map' \
              -E 'NEXT_PUBLIC_SUPABASE_URL|SUPABASE_URL|NEXT_PUBLIC_SUPABASE_ANON_KEY|SUPABASE_ANON_KEY' . \
              | sed -E 's/(eyJ[A-Za-z0-9_.-]+)/[JWT-REDACTED]/g' \
              || true
          } > SUPABASE_ENV_AUDIT.txt
          rm -f .github/workflows/audit-supabase-env-usage.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record Supabase environment audit [skip ci]"
          git push
