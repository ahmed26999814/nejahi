name: Fix Sensitive Env Production

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-sensitive-env-prebuilt.yml"
      - "next.config.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mauriresults-production-prebuilt
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_Hs9izwrJBXYbv6mC5FxhcyNy
  VERCEL_PROJECT_ID: prj_gakC4aJHh0P8f3exGw7xsygjxlaC
  PUBLIC_SUPABASE_FALLBACK: https://nxizqnlemsbjmsfyuevg.supabase.co

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies and Vercel CLI
        run: |
          npm ci
          npm install --global vercel@56.3.0

      - name: Link Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --scope=ahmed-abdellahi-madys-projects

      - name: Write trusted build environment
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          rm -f .env.local .env.production.local

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          def clean(name, fallback=""):
              value = str(os.environ.get(name, "") or "").strip()
              if value in {"[SENSITIVE]", "[REDACTED]"}:
                  value = ""
              return value or fallback

          values = {
              "NEXT_PUBLIC_SUPABASE_URL": clean(
                  "NEXT_PUBLIC_SUPABASE_URL",
                  clean("PUBLIC_SUPABASE_FALLBACK", "https://nxizqnlemsbjmsfyuevg.supabase.co"),
              ),
              "NEXT_PUBLIC_SUPABASE_ANON_KEY": clean("NEXT_PUBLIC_SUPABASE_ANON_KEY"),
              "SUPABASE_URL": clean(
                  "NEXT_PUBLIC_SUPABASE_URL",
                  clean("PUBLIC_SUPABASE_FALLBACK", "https://nxizqnlemsbjmsfyuevg.supabase.co"),
              ),
              "SUPABASE_SERVICE_ROLE_KEY": clean("SUPABASE_SERVICE_ROLE_KEY"),
              "ADMIN_SECRET": clean("ADMIN_SECRET"),
          }

          missing = [
              key for key in (
                  "NEXT_PUBLIC_SUPABASE_ANON_KEY",
                  "SUPABASE_SERVICE_ROLE_KEY",
                  "ADMIN_SECRET",
              )
              if not values[key]
          ]
          if missing:
              raise SystemExit("Missing required GitHub secrets: " + ", ".join(missing))

          if not values["NEXT_PUBLIC_SUPABASE_URL"].startswith("https://"):
              raise SystemExit("Invalid Supabase URL")

          Path(".env.production.local").write_text(
              "".join(
                  f"{key}={json.dumps(value, ensure_ascii=False)}\n"
                  for key, value in values.items()
              ),
              encoding="utf-8",
          )
          print("Trusted production environment prepared")
          PY

      - name: Build clean production output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: vercel build --prod --token="$VERCEL_TOKEN" --scope=ahmed-abdellahi-madys-projects

      - name: Reject redacted environment values
        shell: bash
        run: |
          set -euo pipefail
          if grep -RIl --exclude='*.map' '\[SENSITIVE\]' .vercel/output 2>/dev/null | grep -q .; then
            echo 'Build contains redacted [SENSITIVE] values' >&2
            exit 1
          fi
          if grep -RIl --exclude='*.map' '\[REDACTED\]' .vercel/output 2>/dev/null | grep -q .; then
            echo 'Build contains redacted [REDACTED] values' >&2
            exit 1
          fi

      - name: Deploy prebuilt production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN" --scope=ahmed-abdellahi-madys-projects

      - name: Verify public and admin services
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6 7 8; do
            home_code=$(curl -sS -L -o /tmp/home.html -w '%{http_code}' https://mauri-results.vercel.app/)
            health_code=$(curl -sS -L -o /tmp/health.json -w '%{http_code}' https://mauri-results.vercel.app/api/health)
            exams_code=$(curl -sS -L -o /tmp/exams.json -w '%{http_code}' https://mauri-results.vercel.app/api/public-exams)
            search_code=$(curl -sS -L -o /tmp/search.json -w '%{http_code}' 'https://mauri-results.vercel.app/api/search?source=brevet&q=75457')
            admin_code=$(curl -sS -L -o /tmp/admin.html -w '%{http_code}' https://mauri-results.vercel.app/admin)
            admin_api_code=$(curl -sS -L -o /tmp/admin-content.json -w '%{http_code}' \
              -H "x-admin-secret: $ADMIN_SECRET" \
              https://mauri-results.vercel.app/api/admin/content)

            if [ "$home_code" = "200" ] \
              && [ "$health_code" = "200" ] \
              && [ "$exams_code" = "200" ] \
              && [ "$search_code" = "200" ] \
              && [ "$admin_code" = "200" ] \
              && [ "$admin_api_code" = "200" ] \
              && grep -q 'مجموعة الموقع على واتساب' /tmp/home.html \
              && grep -q '"ok":true' /tmp/health.json \
              && grep -q '"exams"' /tmp/exams.json \
              && grep -q '"items"' /tmp/admin-content.json \
              && ! grep -R '\[SENSITIVE\]\|\[REDACTED\]' /tmp/home.html /tmp/health.json /tmp/exams.json /tmp/search.json /tmp/admin.html /tmp/admin-content.json; then
              echo 'Production site, search, and admin APIs are healthy'
              exit 0
            fi

            echo "Verification attempt $attempt is not healthy yet"
            sleep 10
          done

          echo 'Production verification failed' >&2
          echo "home=$home_code health=$health_code exams=$exams_code search=$search_code admin=$admin_code admin_api=$admin_api_code" >&2
          exit 1
